<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IPTV EPG Guide</title>
    <!-- Плееры для HLS (.m3u8), DASH (.mpd) и MPEG-TS/FLV (.ts) -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dashjs/4.7.4/dash.all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest/dist/mpegts.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117;
            --surface: rgba(22, 27, 34, 0.7);
            --surface-hover: rgba(79, 172, 254, 0.1);
            --accent: #4facfe;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --focus-border: #4facfe;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { 
            background: var(--bg); 
            color: var(--text-muted); 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            overflow: hidden; 
            height: 100vh;
            background-image: radial-gradient(circle at 50% -20%, #1d2d44 0%, #0d1117 80%);
        }

        /* Красивые скроллбары */
        .scrollable::-webkit-scrollbar { width: 5px; }
        .scrollable::-webkit-scrollbar-track { background: transparent; }
        .scrollable::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .scrollable::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        .selector { cursor: pointer; border: 1px solid transparent; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); position: relative; }
        .selector.focus { border-color: var(--focus-border); background: var(--surface-hover); transform: translateX(5px); outline: none; box-shadow: 0 0 15px rgba(79, 172, 254, 0.2); }

        .screen { display: none; height: 100vh; width: 100vw; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .screen.active { display: flex; flex-direction: column; }

        /* Настройки */
        #screen-settings { padding: 40px; justify-content: center; align-items: center; background: var(--bg); }
        .settings-container { 
            width: 100%; max-width: 700px; display: flex; flex-direction: column; gap: 20px; 
            background: var(--surface); backdrop-filter: blur(20px); padding: 40px; border-radius: 24px; border: 1px solid var(--glass);
        }
        .settings-container h1 { font-weight: 800; font-size: 2em; color: #fff; letter-spacing: -1px; margin-bottom: 10px; }
        textarea { 
            width: 100%; height: 160px; background: rgba(0,0,0,0.3); color: #fff; 
            border: 1px solid var(--glass); padding: 15px; border-radius: 12px; font-family: 'JetBrains Mono', monospace; resize: none; transition: border 0.3s;
        }
        textarea:focus { border-color: var(--accent); outline: none; }
        .btn-save { padding: 18px; background: var(--accent); color: #000; border-radius: 12px; text-align: center; font-weight: 800; font-size: 1.1em; text-transform: uppercase; letter-spacing: 1px; }

        /* Шапка */
        .app-header { 
            height: 70px; display: flex; align-items: center; padding: 0 30px; 
            background: rgba(13, 17, 23, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid var(--glass); flex-shrink: 0; z-index: 100;
        }
        .groups-bar { display: flex; gap: 8px; overflow-x: auto; flex: 1; margin: 0 25px; scroll-behavior: smooth; }
        .groups-bar::-webkit-scrollbar { display: none; }
        .group-item { padding: 8px 18px; background: var(--glass); border-radius: 12px; white-space: nowrap; font-size: 0.85em; font-weight: 600; transition: all 0.2s; border: 1px solid transparent; }
        .group-item:hover { background: rgba(255,255,255,0.08); }
        .group-item.active { background: var(--accent); color: #000; box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4); }

        .main-layout { display: flex; flex: 1; overflow: hidden; }

        /* Каналы */
        .col-channels { width: 22%; border-right: 1px solid var(--glass); display: flex; flex-direction: column; background: rgba(0,0,0,0.1); }
        .channel-item { display: flex; align-items: center; padding: 14px 20px; gap: 15px; border-bottom: 1px solid var(--glass); }
        .ch-logo-container { 
            width: 44px; height: 44px; position: relative; flex-shrink: 0; 
            background: var(--glass); border-radius: 10px; overflow: hidden;
            display: flex; align-items: center; justify-content: center; font-weight: 800; color: #fff; border: 1px solid var(--glass);
        }
        .ch-logo { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; background: #000; }
        .ch-info { flex: 1; overflow: hidden; }
        .ch-name { font-weight: 700; font-size: 1em; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 6px; }
        .ch-now { font-size: 0.8em; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 3px; }
        .ch-progress-bg { width: 100%; height: 2px; background: var(--glass); margin-top: 10px; border-radius: 2px; }
        .ch-progress-fill { height: 100%; background: var(--accent); box-shadow: 0 0 10px var(--accent); }
        .archive-marker { color: var(--accent); font-size: 1.1em; }

        /* Расписание и Плеер */
        .col-schedule { width: 33%; border-right: 1px solid var(--glass); display: flex; flex-direction: column; background: rgba(255,255,255,0.01); }
        #player-container { width: 100%; background: #000; flex-shrink: 0; position: sticky; top: 0; z-index: 10; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #main-video { width: 100%; aspect-ratio: 16 / 9; display: block; }

        .prog-item { padding: 18px 25px; border-bottom: 1px solid var(--glass); transition: background 0.2s; }
        .prog-item.active-now { background: var(--surface-hover); border-left: 3px solid var(--accent); }
        .day-header { 
            padding: 12px 25px; background: rgba(0,0,0,0.2); color: var(--accent); 
            font-size: 0.75em; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid var(--glass);
        }
        .prog-time { font-weight: 700; color: #fff; font-size: 0.85em; margin-bottom: 4px; opacity: 0.6; }
        .prog-title { font-size: 0.95em; line-height: 1.4; color: #d0d0d0; font-weight: 500; }
        .archive-icon { position: absolute; right: 15px; top: 18px; font-size: 0.65em; color: var(--accent); border: 1px solid var(--accent); padding: 2px 6px; border-radius: 4px; font-weight: 800; }

        /* Детали */
        .col-details { width: 45%; background: transparent; }
        .details-content { padding: 40px; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .fanart { width: 200px; float: left; border-radius: 16px; margin: 0 30px 20px 0; box-shadow: 0 20px 40px rgba(0,0,0,0.6); border: 1px solid var(--glass); }
        .det-title { font-size: 2.2em; font-weight: 800; margin-bottom: 15px; color: #fff; letter-spacing: -1px; }
        .det-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 25px; }
        .det-meta span { background: var(--glass); padding: 5px 12px; border-radius: 8px; font-size: 0.8em; font-weight: 600; color: var(--accent); border: 1px solid var(--glass); }
        
        .rating-green { background: #238636 !important; color: #fff !important; }
        .rating-red { background: #da3633 !important; color: #fff !important; }

        .det-full-desc { font-size: 1.1em; line-height: 1.7; color: var(--text-muted); margin-top: 30px; }
        .det-separator { border-top: 1px solid var(--glass); margin: 30px 0; }
        
        @media (max-width: 768px) {
            .col-channels, .col-schedule, .col-details { width: 100% !important; display: none !important; }
            .main-layout.view-channels .col-channels { display: flex !important; }
            .main-layout.view-schedule .col-schedule { display: flex !important; }
            .main-layout.view-details .col-details { display: flex !important; }
            #mobile-back { display: block !important; }
            .app-header { padding: 0 15px; height: 60px; }
        }
    </style>
</head>
<body>

<div id="app">
    <!-- ЭКРАН НАСТРОЕК -->
    <div id="screen-settings" class="screen">
        <div class="settings-container">
            <h1>Настройки источников</h1>
            <textarea id="input-m3u" placeholder="Вставьте текст M3U плейлиста сюда..."></textarea>
            <textarea id="input-epg" placeholder="Вставьте текст XMLTV (EPG) сюда..."></textarea>
            <div style="display: flex; align-items: center; gap: 15px; background: var(--surface); padding: 15px; border-radius: 8px;">
                <label style="flex: 1;">Смещение времени (EPG), в часах:</label>
                <input type="number" id="input-tz" value="0" style="width: 80px; padding: 10px; background: #000; border: 1px solid #333; color: #fff; border-radius: 4px;">
            </div>
            <div style="display: flex; gap: 15px;">
                <div class="btn-save selector" id="btn-save" style="flex: 2;">Загрузить данные</div>
                <div class="selector" id="btn-clear-epg" style="flex: 1; padding: 15px; background: #f44336; color: #fff; border-radius: 8px; text-align: center; font-weight: bold; font-size: 1.2em;">Очистить EPG</div>
            </div>
        </div>
    </div>

    <!-- ОСНОВНОЙ ЭКРАН -->
    <div id="screen-main" class="screen">
        <header class="app-header">
            <div id="mobile-back" class="selector" style="display: none; padding: 5px 12px; background: var(--surface); border-radius: 6px; margin-right: 10px;">⬅</div>
            <div style="font-weight: 900; font-size: 1.4em; color: var(--accent); flex-shrink: 0; margin-right: 20px;">EPG GUIDE</div>
            
            <div id="search-wrapper" class="selector" style="display: flex; align-items: center; background: var(--surface); padding: 0 10px; border-radius: 6px; flex: 1; max-width: 300px;">
                <span style="opacity: 0.5; margin-right: 8px;">🔍</span>
                <input type="text" id="input-search" placeholder="Поиск каналов и передач..." style="background: transparent; border: none; color: #fff; padding: 8px 0; outline: none; width: 100%; font-size: 0.9em;">
            </div>

            <div class="groups-bar" id="groups-bar"></div>
            <div class="selector" id="btn-to-settings" style="padding: 5px 15px; background: var(--surface); border-radius: 6px;">⚙ Настройки</div>
        </header>

        <div class="main-layout">
            <div id="player-container">
                <div id="btn-stop-player" class="selector">✖ ОСТАНОВИТЬ</div>
                <div id="volume-hud">
                    <div style="font-size: 2em;" id="vol-icon">🔊</div>
                    <div id="vol-value" style="font-weight: bold; margin-top: 5px;">100%</div>
                    <div class="vol-bar-bg"><div class="vol-bar-fill" id="vol-fill" style="width: 100%;"></div></div>
                </div>
                <video id="main-video" controls autoplay class="selector"></video>
            </div>

            <!-- Колонки -->
            <div class="col-channels">
                <div class="scrollable" id="list-channels"></div>
            </div>
            
            <div class="col-schedule">
                <div class="scrollable" id="list-schedule"></div>
            </div>

            <div class="col-details">
                <div class="scrollable" id="details-view">
                    <div class="details-content" id="details-container">
                        <div style="text-align: center; opacity: 0.3; margin-top: 50px;">Выберите передачу для просмотра описания</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
/**
 * IPTV EPG GUIDE ENGINE
 */
const App = {
    channels: [],
    epg: {},
    groups: [],
    currentGroup: 'Все',
    searchQuery: '',
    selectedChannel: null,
    playingChannelId: null,
    selectedProgram: null,
    playingProgramId: null,

    async init() {
        // Логика поиска
        const searchInput = document.getElementById('input-search');
        const searchWrapper = document.getElementById('search-wrapper');

        searchWrapper.onclick = () => {
            searchInput.focus();
        };

        searchInput.oninput = (e) => {
            this.searchQuery = e.target.value;
            this.renderChannels();
            // Если мы в поиске, обновляем и правую колонку тоже
            if (this.searchQuery) {
                this.renderSchedule();
            } else if (this.selectedChannel) {
                this.renderSchedule(this.selectedChannel.id);
            }
        };

        searchInput.onkeydown = (e) => {
            if (e.key === 'Enter') searchInput.blur();
            if (e.key === 'ArrowDown') {
                searchInput.blur();
                const firstChannel = document.querySelector('#list-channels .selector');
                if (firstChannel) Nav.setFocus(firstChannel);
            }
        };
        Nav.init();

        // Инициализация жестов (Swipe)
        let touchStartX = 0;
        const layout = document.querySelector('.main-layout');
        layout.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, {passive: true});
        layout.addEventListener('touchend', e => {
            const touchEndX = e.changedTouches[0].screenX;
            const diff = touchStartX - touchEndX;
            if (Math.abs(diff) > 60) { // Порог свайпа
                if (diff > 0) { // Свайп влево -> Вперед
                    if (this.currentView === 'channels') this.setMobileView('schedule');
                    else if (this.currentView === 'schedule') this.setMobileView('details');
                } else { // Свайп вправо -> Назад
                    this.goBack();
                }
            }
        }, {passive: true});

        // Слушатель системной кнопки "Назад"
        window.addEventListener('popstate', (e) => {
            if (this.currentView === 'details') {
                this.setMobileView('schedule', true);
            } else if (this.currentView === 'schedule') {
                this.setMobileView('channels', true);
            }
        });

        // Регистрация Service Worker для обхода Referer/User-Agent
        if ('serviceWorker' in navigator) {
            // Регистрация с принудительным обновлением при каждом запуске
            navigator.serviceWorker.register('sw.js', { updateViaCache: 'none' })
                .then(reg => {
                    reg.update(); // Проверяем обновление файла sw.js на сервере
                    console.log('Service Worker: Активен');
                })
                .catch(err => console.error('Service Worker: Ошибка', err));
        }
        
        const m3u = localStorage.getItem('guide_m3u') || '';
        const tz = localStorage.getItem('guide_tz') || '0';
        document.getElementById('input-m3u').value = m3u;
        document.getElementById('input-tz').value = tz;

        // EPG текст слишком большой для localStorage, проверяем базу
        const cachedEpg = await DB.load();
        if (cachedEpg) {
            document.getElementById('input-epg').placeholder = "EPG уже загружен в базу данных. Вставьте новый текст только если нужно обновить программу.";
        }

        document.getElementById('btn-save').onclick = () => this.loadData();
        document.getElementById('btn-clear-epg').onclick = () => this.clearEPG();
        document.getElementById('btn-to-settings').onclick = () => this.showScreen('settings');
        document.getElementById('mobile-back').onclick = () => this.goBack();
        document.getElementById('btn-stop-player').onclick = () => {
            Player.stop();
            this.playingChannelId = null;
            this.playingProgramId = null;
            this.renderChannels();
            this.renderSchedule(this.selectedChannel?.id);
        };

        // Запуск живого обновления прогресса (раз в 30 сек)
        setInterval(() => this.updateProgress(), 30000);

        if (m3u) {
            // Пытаемся быстро загрузить EPG из кэша IndexedDB
            const cachedEpg = await DB.load();
            if (cachedEpg) {
                this.epg = cachedEpg;
                this.channels = Parser.m3u(m3u);
                const gSet = new Set(['Все']);
                this.channels.forEach(c => { if(c.group) gSet.add(c.group); });
                this.groups = Array.from(gSet);
                this.renderGroups();
                this.renderChannels();
                this.showScreen('main');
            } else {
                // Если в базе пусто, но текст есть — парсим
                this.loadData();
            }
        } else {
            this.showScreen('settings');
        }
    },

    showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(`screen-${id}`).classList.add('active');
        if (id === 'main') this.setMobileView('channels');
        Nav.resetFocus();
    },

    setMobileView(view, isBackAction = false) {
        const layout = document.querySelector('.main-layout');
        layout.classList.remove('view-channels', 'view-schedule', 'view-details');
        layout.classList.add('view-' + view);
        this.currentView = view;
        
        // Добавляем запись в историю, если это не переход по кнопке "Назад"
        if (!isBackAction) {
            history.pushState({view: view}, '');
        }
        
        // Скрываем кнопку Назад на главном списке каналов
        document.getElementById('mobile-back').style.visibility = (view === 'channels') ? 'hidden' : 'visible';
    },

    goBack() {
        if (this.currentView === 'details') this.setMobileView('schedule');
        else if (this.currentView === 'schedule') this.setMobileView('channels');
    },

    async loadData() {
        const m3uText = document.getElementById('input-m3u').value;
        const epgText = document.getElementById('input-epg').value;
        const tzValue = document.getElementById('input-tz').value;

        // Сохраняем в localStorage только маленькие данные
        localStorage.setItem('guide_m3u', m3uText);
        localStorage.setItem('guide_tz', tzValue);

        this.channels = Parser.m3u(m3uText);
        
        if (epgText.trim()) {
            this.epg = Parser.xmltv(epgText);
            // Сохраняем распарсенную программу в быструю базу данных (IndexedDB)
            if (Object.keys(this.epg).length > 0) {
                await DB.save(this.epg);
            }
        } else {
            // Если текст не вставили, пробуем взять то, что уже есть в базе
            const cached = await DB.load();
            if (cached) this.epg = cached;
        }

        const gSet = new Set(['Все']);
        this.channels.forEach(c => { if(c.group) gSet.add(c.group); });
        this.groups = Array.from(gSet);

        this.renderGroups();
        this.renderChannels();
        this.showScreen('main');
    },

    renderGroups() {
        const bar = document.getElementById('groups-bar');
        bar.innerHTML = this.groups.map(g => 
            `<div class="group-item selector ${g === this.currentGroup ? 'active' : ''}" data-group="${g}">${g}</div>`
        ).join('');

        bar.querySelectorAll('.group-item').forEach(el => {
            el.onclick = () => {
                this.currentGroup = el.dataset.group;
                this.renderGroups();
                this.renderChannels();
            };
        });
    },

    updateProgress() {
        const now = Date.now();
        document.querySelectorAll('.channel-item').forEach(el => {
            const chId = el.dataset.id;
            if (!chId || !this.epg[chId]) return;

            const prog = this.epg[chId].find(p => now >= p.start && now <= p.stop);
            if (prog) {
                const total = prog.stop - prog.start;
                const elapsed = now - prog.start;
                const progressWidth = Math.max(0, Math.min(100, (elapsed / total) * 100));

                const titleEl = el.querySelector('.ch-now');
                const progressEl = el.querySelector('.ch-progress-fill');

                if (titleEl && titleEl.innerText !== prog.title) titleEl.innerText = prog.title;
                if (progressEl) progressEl.style.width = progressWidth + '%';
            }
        });
    },

    renderChannels() {
        const list = document.getElementById('list-channels');
        list.innerHTML = '';
        const now = Date.now();

        const filtered = this.channels.filter(c => {
            const matchesGroup = this.currentGroup === 'Все' || c.group === this.currentGroup;
            if (!this.searchQuery) return matchesGroup;

            const q = this.searchQuery.toLowerCase();
            const matchesName = c.name.toLowerCase().includes(q);
            const matchesEpg = (this.epg[c.id] || []).some(p => 
                p.title.toLowerCase().includes(q) || (p.subTitle && p.subTitle.toLowerCase().includes(q))
            );
            return matchesGroup && (matchesName || matchesEpg);
        });

        if (filtered.length === 0 && this.searchQuery) {
            list.innerHTML = '<div style="padding:20px; opacity:0.3; text-align:center;">Каналы не найдены</div>';
        }

        filtered.forEach(ch => {
            const el = document.createElement('div');
            el.className = `channel-item selector ${this.selectedChannel?.id === ch.id ? 'is-selected' : ''} ${this.playingChannelId === ch.id ? 'is-playing' : ''}`;
            el.dataset.id = ch.id;
            
            let nowTitle = 'Нет данных';
            let progressWidth = 0;
            if (this.epg[ch.id]) {
                const prog = this.epg[ch.id].find(p => now >= p.start && now <= p.stop);
                if (prog) {
                    nowTitle = prog.title;
                    const total = prog.stop - prog.start, elapsed = now - prog.start;
                    progressWidth = Math.max(0, Math.min(100, (elapsed / total) * 100));
                }
            }

            el.innerHTML = `
                <div class="ch-logo-container">
                    ${ch.name[0].toUpperCase()}${ch.logo ? `<img class="ch-logo" src="${ch.logo}" onerror="this.style.opacity=0">` : ''}
                </div>
                <div class="ch-info">
                    <div class="ch-name">${this.highlight(ch.name, this.searchQuery)} ${ch.archive ? '<span class="archive-marker">↺</span>' : ''}</div>
                    <div class="ch-now">${this.highlight(nowTitle, this.searchQuery)}</div>
                    <div class="ch-progress-bg"><div class="ch-progress-fill" style="width: ${progressWidth}%"></div></div>
                </div>
            `;
            el.onclick = () => {
                this.searchQuery = ''; 
                document.getElementById('input-search').value = '';
                this.selectChannel(ch, el);
            };
            list.appendChild(el);
        });
        Nav.resetFocus();
    },

    selectChannel(ch, element) {
        // Если канал уже выбран (1-й клик был), то 2-й клик запускает видео
        if (this.selectedChannel && this.selectedChannel.id === ch.id) {
            this.playingChannelId = ch.id;
            this.playingProgramId = null; // Сбрасываем метку архива
            Player.play(ch.url);
            this.renderChannels(); // Обновить метку "играет сейчас"
        } else {
            // Первый клик - просто выбор
            this.selectedChannel = ch;
            this.renderChannels(); // Обновить белую рамку
            this.renderSchedule(ch.id);
            if (window.innerWidth <= 768) this.setMobileView('schedule');
        }
    },

    renderSchedule(channelId) {
        const list = document.getElementById('list-schedule');
        list.innerHTML = '';
        const now = Date.now();
        let programs = [];

        // Если есть поисковый запрос - собираем данные со всех каналов
        if (this.searchQuery) {
            const q = this.searchQuery.toLowerCase();
            Object.keys(this.epg).forEach(chId => {
                const ch = this.channels.find(c => c.id === chId);
                this.epg[chId].forEach(p => {
                    if (p.title.toLowerCase().includes(q) || (p.subTitle && p.subTitle.toLowerCase().includes(q))) {
                        programs.push({...p, channelName: ch ? ch.name : chId, channelObj: ch});
                    }
                });
            });
            // Сортировка: Хронологическая (Архив -> Сейчас -> Будущее)
            programs.sort((a, b) => a.start - b.start);
        } else {
            programs = (this.epg[channelId] || []).map(p => ({...p, channelObj: this.selectedChannel}));
        }

        if (programs.length === 0) {
            list.innerHTML = `<div style="padding:20px; opacity:0.3;">${this.searchQuery ? 'Ничего не найдено' : 'Программа отсутствует'}</div>`;
            return;
        }

        let lastDateStr = '';
        programs.forEach(p => {
            const pDate = new Date(p.start);
            const pDateStr = pDate.toDateString();
            if (pDateStr !== lastDateStr) {
                const header = document.createElement('div');
                header.className = 'day-header';
                header.innerText = this.formatDate(p.start);
                list.appendChild(header);
                lastDateStr = pDateStr;
            }

            const isNow = now >= p.start && now <= p.stop;
            const isPast = now > p.stop;
            const hasArchive = isPast && p.channelObj?.archive;
            const progId = p.start + p.title + (p.channelName || '');

            const el = document.createElement('div');
            el.className = `prog-item selector ${isNow ? 'active-now' : ''} ${this.selectedProgram === progId ? 'is-selected' : ''} ${this.playingProgramId === progId ? 'is-playing' : ''}`;
            
            el.innerHTML = `
                ${hasArchive ? '<span class="archive-icon">АРХИВ</span>' : ''}
                <div class="prog-time">${p.timeStart} - ${p.timeStop} ${p.channelName ? `<span style="color:var(--accent); margin-left:10px;">[${p.channelName}]</span>` : ''}</div>
                <div class="prog-title">${this.highlight(p.title, this.searchQuery)}</div>
            `;

            el.onclick = () => {
                if (this.selectedProgram === progId) {
                    if (isNow && p.channelObj) {
                        this.playingChannelId = p.channelObj.id;
                        this.playingProgramId = null;
                        Player.play(p.channelObj.url);
                    } else if (hasArchive && p.channelObj) {
                        this.playingChannelId = p.channelObj.id;
                        this.playingProgramId = progId;
                        Player.play(Catchup.buildUrl(p.channelObj, p));
                    }
                    this.renderSchedule(channelId);
                    this.renderChannels();
                } else {
                    this.selectedProgram = progId;
                    this.renderDetails(p);
                    this.renderSchedule(channelId);
                }
            };
            list.appendChild(el);
            if (isNow && !this.selectedProgram && !this.searchQuery) {
                setTimeout(() => el.scrollIntoView({behavior: 'smooth', block: 'center'}), 100);
            }
        });
    },

    renderDetails(p) {
        const container = document.getElementById('details-container');
        
        // Обработка рейтинга
        const rating = this.getRatingInfo(p.rating);
        const ratingHtml = rating ? `<span class="${rating.class}">${rating.label}</span>` : '';

        // Умная обработка заголовка и подзаголовка
        let fullTitle = p.title;
        let sloganHtml = '';
        
        if (p.subTitle) {
            // Если подзаголовка еще нет в основном названии
            if (!p.title.toLowerCase().includes(p.subTitle.toLowerCase())) {
                // Если подзаголовок короткий (название серии), добавляем к заголовку
                if (p.subTitle.length < 40 && !p.subTitle.includes('«')) {
                    fullTitle += `: ${p.subTitle}`;
                } else {
                    // Иначе выводим как слоган на второй строке
                    sloganHtml = `<div style="font-style: italic; opacity: 0.7; margin: -5px 0 15px 0; font-size: 1.1em; color: #d0d0d0;">${p.subTitle}</div>`;
                }
            }
        }

        // Собираем мета-информацию (Тех. инфо)
        const duration = this.formatDuration(p.durationMs);
        const metaHtml = `
            <div class="det-meta">
                ${ratingHtml}
                ${p.episode ? `<span style="background: var(--accent); color: #000;">${p.episode}</span>` : ''}
                ${duration ? `<span>${duration}</span>` : ''}
                ${p.date ? `<span>${p.date}</span>` : ''}
                ${p.countries.map(c => `<span>${c}</span>`).join('')}
                ${p.categories.map(c => `<span>${c}</span>`).join('')}
            </div>
        `;

        const directors = p.directors.length ? `<div class="det-credits-top"><span class="credit-label">Режиссер:</span> <span class="credit-value">${p.directors.join(', ')}</span></div>` : '';
        const actors = p.actors.length ? `<div class="det-credits-top"><span class="credit-label">В ролях:</span> <span class="credit-value">${p.actors.join(', ')}</span></div>` : '';

        container.innerHTML = `
            <img class="fanart" id="det-img" src="${p.icon}" onload="this.style.display='block'">
            <div class="det-title">${fullTitle}</div>
            ${sloganHtml}
            ${metaHtml}
            ${directors}
            ${actors}
            <div class="det-separator"></div>
            <div class="det-full-desc">${p.desc}</div>
        `;
        document.getElementById('details-view').scrollTop = 0;
        if (window.innerWidth <= 768) this.setMobileView('details');
    },

    formatDate(timestamp) {
        const d = new Date(timestamp);
        const days = ['Воскресенье', 'Понедельник', 'Вторник', 'Среда', 'Четверг', 'Пятница', 'Суббота'];
        const months = ['января', 'февраля', 'марта', 'апреля', 'мая', 'июня', 'июля', 'августа', 'сентября', 'октября', 'ноября', 'декабря'];
        const dayName = days[d.getDay()];
        const monthName = months[d.getMonth()];
        const year = d.getFullYear();
        const currentYear = new Date().getFullYear();
        const yearStr = year !== currentYear ? ` ${year}` : '';
        return `${dayName}, ${d.getDate()} ${monthName}${yearStr}`;
    },

    getRatingInfo(val) {
        if (!val) return null;
        const s = val.toString().toLowerCase().trim().replace('+', '');
        
        const green = ['0', 'g', 'al', 'all', 'general'];
        const yellow = ['6', '12', 'pg', 'pg-12', '6-12'];
        const orange = ['16', 'pg-13', '16-18'];
        const red = ['18', 'r', 'nc-17', 'x', 'adult', '18-only'];

        if (green.includes(s)) return { class: 'rating-green', label: val };
        if (yellow.includes(s)) return { class: 'rating-yellow', label: val };
        if (orange.includes(s)) return { class: 'rating-orange', label: val };
        if (red.includes(s)) return { class: 'rating-red', label: val };
        
        return { class: '', label: val };
    },

    formatDuration(ms) {
        if (!ms) return '';
        const totalMinutes = Math.round(ms / 60000);
        const hours = Math.floor(totalMinutes / 60);
        const minutes = totalMinutes % 60;
        
        let res = '';
        if (hours > 0) res += hours + ' ч. ';
        if (minutes > 0 || hours === 0) res += minutes + ' мин.';
        return res.trim();
    },

    highlight(text, q) {
        if (!q || !text) return text;
        const escapedQ = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const regex = new RegExp(`(${escapedQ})`, 'gi');
        return text.toString().replace(regex, '<mark class="search-highlight">$1</mark>');
    },

    adjustVolume(delta) {
        const video = document.getElementById('main-video');
        if (!video) return;

        let vol = video.volume + delta;
        if (vol > 1) vol = 1;
        if (vol < 0) vol = 0;
        video.volume = vol;

        // Показ HUD
        const hud = document.getElementById('volume-hud');
        const val = document.getElementById('vol-value');
        const fill = document.getElementById('vol-fill');
        const icon = document.getElementById('vol-icon');

        if (hud) {
            hud.style.display = 'flex';
            const percent = Math.round(vol * 100);
            val.innerText = percent + '%';
            fill.style.width = percent + '%';
            icon.innerText = video.muted || vol === 0 ? '🔇' : (vol < 0.5 ? '🔉' : '🔊');

            clearTimeout(this.volTimer);
            this.volTimer = setTimeout(() => hud.style.display = 'none', 2000);
        }
    },

    async clearEPG() {
        if (confirm('Вы уверены, что хотите полностью удалить программу передач из памяти?')) {
            await DB.clear();
            this.epg = {};
            document.getElementById('input-epg').value = '';
            document.getElementById('input-epg').placeholder = "Вставьте текст XMLTV (EPG) сюда...";
            alert('База EPG очищена');
            this.renderChannels();
        }
    }
};

/**
 * PARSERS
 */
const Parser = {
    m3u(text) {
        const lines = text.split(/\r?\n/);
        const channels = [];
        let current = null;

        lines.forEach(line => {
            line = line.trim();
            if (line.startsWith('#EXTINF:')) {
                current = {
                    id: this.attr(line, 'tvg-id') || this.attr(line, 'tvg-name'),
                    name: line.split(',').pop().trim(),
                    logo: this.attr(line, 'tvg-logo'),
                    group: this.attr(line, 'group-title'),
                    archive: line.includes('catchup="') || line.includes('catchup-days="'),
                    catchupType: this.attr(line, 'catchup'),
                    catchupSource: this.attr(line, 'catchup-source')
                };
            } else if (line && !line.startsWith('#')) {
                if (current) {
                    current.url = line;
                    channels.push(current);
                    current = null;
                }
            }
        });
        return channels;
    },

    attr(line, name) {
        const match = line.match(new RegExp(`${name}="([^"]*)"`, 'i'));
        return match ? match[1] : '';
    },

    xmltv(xmlString) {
        if (!xmlString) return {};
        const parser = new DOMParser();
        const doc = parser.parseFromString(xmlString, 'text/xml');
        const result = {};

        const progs = doc.getElementsByTagName('programme');
        for (let p of progs) {
            const chId = p.getAttribute('channel');
            const start = this.parseDate(p.getAttribute('start'));
            const stop = this.parseDate(p.getAttribute('stop'));

            if (!result[chId]) result[chId] = [];

            const getTag = (name) => p.getElementsByTagName(name)[0]?.textContent || '';
            const getTags = (name) => Array.from(p.getElementsByTagName(name)).map(el => el.textContent);

            // Парсинг номера серии (из разных форматов)
            let episode = p.getElementsByTagName('episode-num');
            let epText = '';
            for (let ep of episode) {
                let sys = ep.getAttribute('system');
                let val = ep.textContent.trim();
                if (sys === 'onscreen') epText = val;
                else if (sys === 'xmltv_ns' && !epText) {
                    let parts = val.split('.');
                    let s = parseInt(parts[0]) + 1;
                    let e = parseInt(parts[1]) + 1;
                    if (!isNaN(s) && !isNaN(e)) epText = `S${s} E${e}`;
                }
            }

            result[chId].push({
                start: start.getTime(),
                stop: stop.getTime(),
                durationMs: stop.getTime() - start.getTime(),
                timeStart: this.formatTime(start),
                timeStop: this.formatTime(stop),
                title: getTag('title'),
                subTitle: getTag('sub-title'),
                episode: epText,
                desc: getTag('desc'),
                icon: p.getElementsByTagName('icon')[0]?.getAttribute('src') || '',
                categories: getTags('category'),
                date: getTag('date'),
                countries: getTags('country'),
                rating: p.getElementsByTagName('rating')[0]?.getElementsByTagName('value')[0]?.textContent || '',
                directors: Array.from(p.getElementsByTagName('director')).map(el => el.textContent),
                actors: Array.from(p.getElementsByTagName('actor')).map(el => el.textContent),
                hasArchive: false
            });
        }
        return result;
    },

    parseDate(str) {
        // Гибкий формат: YYYYMMDDHHMM[SS] [+/-HHMM]
        const m = str.match(/^(\d{4})(\d{2})(\d{2})(\d{2})(\d{2})(\d{2})?\s*([+-]\d{4})?/);
        let date = new Date();
        if (m) {
            const sec = m[6] || '00';
            const tz = m[7] ? `${m[7].slice(0,3)}:${m[7].slice(3)}` : 'Z';
            const iso = `${m[1]}-${m[2]}-${m[3]}T${m[4]}:${m[5]}:${sec}${tz}`;
            date = new Date(iso);
        }
        
        if (isNaN(date.getTime())) date = new Date();

        // Применяем пользовательский сдвиг (Timezone Offset)
        const offsetHours = parseInt(localStorage.getItem('guide_tz') || '0');
        if (offsetHours !== 0) {
            date.setHours(date.getHours() + offsetHours);
        }
        return date;
    },

    formatTime(d) {
        return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
    }
};

/**
 * SPATIAL NAVIGATION (REMOTE CONTROL)
 */
const Nav = {
    current: null,
    init() {
        window.addEventListener('keydown', (e) => {
            const video = document.getElementById('main-video');
            const isVideoFocused = this.current && this.current.id === 'main-video';

            // Глобальные клавиши громкости (+, -, M)
            if (e.key === '+' || e.key === '=') { App.adjustVolume(0.05); return; }
            if (e.key === '-' || e.key === '_') { App.adjustVolume(-0.05); return; }
            if (e.key.toLowerCase() === 'm') { 
                if (video) video.muted = !video.muted; 
                App.adjustVolume(0); 
                return; 
            }

            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Enter'].includes(e.key)) {
                // Если мы в поле ввода - не перехватываем стрелки (кроме Escape)
                if (document.activeElement.tagName === 'TEXTAREA' || document.activeElement.tagName === 'INPUT') {
                    if (e.key === 'Escape') document.activeElement.blur();
                    return;
                }

                // Управление громкостью стрелками Вверх/Вниз, если смотрим видео
                if (isVideoFocused && (e.key === 'ArrowUp' || e.key === 'ArrowDown')) {
                    e.preventDefault();
                    App.adjustVolume(e.key === 'ArrowUp' ? 0.05 : -0.05);
                    return;
                }

                e.preventDefault();
                this.move(e.key);
            }
        });
        
        document.addEventListener('mouseover', (e) => {
            const s = e.target.closest('.selector');
            if (s) this.setFocus(s);
        });
    },

    setFocus(el) {
        if (this.current) this.current.classList.remove('focus');
        this.current = el;
        el.classList.add('focus');
        el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    },

    resetFocus() {
        const first = document.querySelector('.screen.active .selector');
        if (first) this.setFocus(first);
    },

    move(key) {
        if (document.activeElement.tagName === 'TEXTAREA' || document.activeElement.tagName === 'INPUT') {
            return;
        }

        if (key === 'Enter') {
            this.current?.click();
            return;
        }

        const rect = this.current.getBoundingClientRect();
        const curX = rect.left + rect.width / 2;
        const curY = rect.top + rect.height / 2;

        const all = Array.from(document.querySelectorAll('.screen.active .selector'));
        let best = null;
        let minDiff = Infinity;

        all.forEach(el => {
            if (el === this.current) return;
            const r = el.getBoundingClientRect();
            const x = r.left + r.width / 2;
            const y = r.top + r.height / 2;

            const dx = x - curX;
            const dy = y - curY;

            let valid = false;
            if (key === 'ArrowUp' && dy < 0 && Math.abs(dx) < Math.abs(dy)) valid = true;
            if (key === 'ArrowDown' && dy > 0 && Math.abs(dx) < Math.abs(dy)) valid = true;
            if (key === 'ArrowLeft' && dx < 0 && Math.abs(dy) < Math.abs(dx)) valid = true;
            if (key === 'ArrowRight' && dx > 0 && Math.abs(dy) < Math.abs(dx)) valid = true;

            if (valid) {
                // Умный расчет дистанции: штрафуем отклонение от оси движения
                // При движении по горизонтали (Left/Right) увеличиваем вес вертикального смещения и наоборот
                const penalty = 5; // Коэффициент штрафа
                let diff;
                
                if (key === 'ArrowLeft' || key === 'ArrowRight') {
                    diff = Math.abs(dx) + (Math.abs(dy) * penalty);
                } else {
                    diff = Math.abs(dy) + (Math.abs(dx) * penalty);
                }

                if (diff < minDiff) {
                    minDiff = diff;
                    best = el;
                }
            }
        });

        if (best) this.setFocus(best);
    }
};

/**
 * DATABASE MANAGER (IndexedDB)
 */
const DB = {
    dbName: 'IPTV_EPG_CACHE',
    storeName: 'epg_data',

    open() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(this.dbName, 1);
            request.onupgradeneeded = (e) => {
                e.target.result.createObjectStore(this.storeName);
            };
            request.onsuccess = (e) => resolve(e.target.result);
            request.onerror = (e) => reject(e.target.error);
        });
    },

    async save(epgObject) {
        const db = await this.open();
        const tx = db.transaction(this.storeName, 'readwrite');
        tx.objectStore(this.storeName).put(epgObject, 'current_epg');
        return new Promise((resolve) => tx.oncomplete = () => resolve());
    },

    async load() {
        const db = await this.open();
        return new Promise((resolve) => {
            const request = db.transaction(this.storeName).objectStore(this.storeName).get('current_epg');
            request.onsuccess = () => resolve(request.result || null);
            request.onerror = () => resolve(null);
        });
    },

    async clear() {
        const db = await this.open();
        const tx = db.transaction(this.storeName, 'readwrite');
        tx.objectStore(this.storeName).delete('current_epg');
        return new Promise((resolve) => tx.oncomplete = () => resolve());
    }
};

/**
 * LOGIC FOR CATCHUP (ARCHIVE)
 */
const Catchup = {
    buildUrl(channel, p) {
        let source = channel.catchupSource;
        if (!source) return channel.url;

        // Разделяем URL и параметры заголовков для SW
        const parts = channel.url.split('|');
        let baseUrl = parts[0];
        const swParams = parts[1] ? '|' + parts[1] : '';
        
        const startTS = Math.floor(p.start / 1000);
        const endTS = Math.floor(p.stop / 1000);
        const dur = Math.round((p.stop - p.start) / 1000);

        // Замена плейсхолдеров
        let query = source
            .replace(/\${start}/g, startTS).replace(/{utc}/g, startTS)
            .replace(/\${end}/g, endTS).replace(/{lutc}/g, endTS)
            .replace(/\${duration}/g, dur).replace(/{offset}/g, '0');

        let finalUrl = '';
        if (query.startsWith('?') || query.startsWith('&')) {
            const sep = baseUrl.includes('?') ? '&' : '?';
            finalUrl = baseUrl + sep + query.replace(/^[?&]/, '');
        } else if (query.includes('://')) {
            finalUrl = query;
        } else {
            const sep = baseUrl.endsWith('/') ? '' : '/';
            finalUrl = baseUrl + (channel.catchupType === 'append' ? query : sep + query);
        }

        return finalUrl + swParams;
    }
};

/**
 * VIDEO PLAYER ENGINE
 */
const Player = {
    hls: null,
    dash: null,
    ts: null,
    lastUrl: '',
    isRetrying: false,

    play(url) {
        // Принудительно сбрасываем заголовки при любом старте нового видео
        window.dispatchEvent(new CustomEvent('iptv-reset-headers'));

        this.stop();
        const video = document.getElementById('main-video');
        if (!video) return;

        // Показываем контейнер плеера
        const container = document.getElementById('player-container');
        if (container) container.style.display = 'block';

        this.lastUrl = url;
        
        video.onerror = (e) => {
            console.error("Video Element Error:", e);
            this.handleError();
        };

        const streamTypeUrl = url.split('|')[0].split('%7C')[0].toLowerCase();

        if (streamTypeUrl.includes('.mpd')) {
            this.dash = dashjs.MediaPlayer().create();
            this.dash.initialize(video, url, true);
        } else if (streamTypeUrl.includes('.m3u8')) {
            if (Hls.isSupported()) {
                this.hls = new Hls({
                    enableWorker: true,
                    lowLatencyMode: true,
                    xhrSetup: (xhr) => { xhr.withCredentials = false; }
                });
                this.hls.loadSource(url);
                this.hls.attachMedia(video);
                this.hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play().catch(() => {});
                });
                this.hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        console.warn("HLS Fatal Error:", data.type);
                        this.handleError();
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.play().catch(() => {});
            }
        } else if (streamTypeUrl.includes('.ts') || streamTypeUrl.includes('.flv')) {
            if (mpegts.getFeatureList().mse) {
                this.ts = mpegts.createPlayer({
                    type: streamTypeUrl.includes('.ts') ? 'mse' : 'flv',
                    url: url
                });
                this.ts.attachMediaElement(video);
                this.ts.load();
                this.ts.play().catch(() => this.handleError());
            }
        } else {
            video.src = url;
            video.play().catch(() => this.handleError());
        }
    },

    handleError() {
        if (this.isRetrying) return;
        
        const hasPipe = this.lastUrl.includes('|') || this.lastUrl.includes('%7C');
        if (hasPipe) {
            this.isRetrying = true;
            const cleanUrl = this.lastUrl.split('|')[0].split('%7C')[0];
            console.log("Fallback: пробуем чистую ссылку...");
            
            setTimeout(() => {
                const retryState = this.isRetrying;
                this.stop();
                this.isRetrying = retryState; 
                this.play(cleanUrl, true);
            }, 1500);
        }
    },

    play(url, isRetry = false) {
        if (!isRetry) this.isRetrying = false;
        // Принудительно сбрасываем заголовки при любом старте нового видео
        window.dispatchEvent(new CustomEvent('iptv-reset-headers'));

        this.stop();
        const video = document.getElementById('main-video');
        if (!video) return;

        // Показываем контейнер плеера и ставим метку активности
        const container = document.getElementById('player-container');
        const layout = document.querySelector('.main-layout');
        if (container) container.style.display = 'block';
        if (layout) layout.classList.add('player-active');

        this.lastUrl = url;
        
        video.onerror = (e) => {
            console.error("Video Element Error:", e);
            this.handleError();
        };

        const streamTypeUrl = url.split('|')[0].split('%7C')[0].toLowerCase();

        if (streamTypeUrl.includes('.mpd')) {
            this.dash = dashjs.MediaPlayer().create();
            this.dash.initialize(video, url, true);
        } else if (streamTypeUrl.includes('.m3u8')) {
            if (Hls.isSupported()) {
                this.hls = new Hls({
                    enableWorker: true,
                    lowLatencyMode: true,
                    xhrSetup: (xhr) => { xhr.withCredentials = false; }
                });
                this.hls.loadSource(url);
                this.hls.attachMedia(video);
                this.hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play().catch(() => {});
                });
                this.hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        console.warn("HLS Fatal Error:", data.type);
                        this.handleError();
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.play().catch(() => {});
            }
        } else if (streamTypeUrl.includes('.ts') || streamTypeUrl.includes('.flv')) {
            if (mpegts.getFeatureList().mse) {
                this.ts = mpegts.createPlayer({
                    type: streamTypeUrl.includes('.ts') ? 'mse' : 'flv',
                    url: url
                });
                this.ts.attachMediaElement(video);
                this.ts.load();
                this.ts.play().catch(() => this.handleError());
            }
        } else {
            video.src = url;
            video.play().catch(() => this.handleError());
        }
    },

    stop() {
        const video = document.getElementById('main-video');
        if (this.hls) { this.hls.destroy(); this.hls = null; }
        if (this.dash) { this.dash.reset(); this.dash = null; }
        if (this.ts) { this.ts.destroy(); this.ts = null; }
        
        if (video) {
            video.onerror = null;
            video.pause();
            video.removeAttribute('src');
            video.load();
        }
        
        // Скрываем контейнер плеера и убираем метку активности
        const container = document.getElementById('player-container');
        const layout = document.querySelector('.main-layout');
        if (container) container.style.display = 'none';
        if (layout) layout.classList.remove('player-active');
    }
};

document.addEventListener('DOMContentLoaded', () => App.init());
</script>
</body>
</html>
